<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Laboratorio de Procesamiento de Señales (v18.33)</title>

    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="container">

    <header class="header">
        <div class="header-top">
            <h1>Signal Lab</h1>
            <div class="version-badge">v18.33</div>
        </div>
        <h2 class="header-subtitle">Laboratorio interactivo de convolución y correlación</h2>
    </header>

    <div class="dashboard">
        <div class="stage-left-modular">

            <div class="channel-block">
                <div id="latex-f" class="channel-title"></div>
                <div class="mini-svg-container">
                    <svg viewBox="0 0 600 110">
                        <g transform="translate(45,55)">
                            <line x1="0" y1="0" x2="500" y2="0" class="axis" />
                            <path id="path-f" class="sig-f" />
                            <line id="guide-1" x1="0" y1="-55" x2="0" y2="55" stroke="#e5e5ea" stroke-dasharray="4" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="channel-block">
                <div id="latex-h" class="channel-title"></div>
                <div class="mini-svg-container">
                    <svg viewBox="0 0 600 110">
                        <g transform="translate(45,55)">
                            <line x1="0" y1="0" x2="500" y2="0" class="axis" />
                            <path id="path-h-base" class="sig-h-base" />
                            <path id="path-h-flip" class="sig-h-flip" />
                            <path id="path-h" class="sig-h" />
                            <circle id="p2" r="4" fill="var(--inverse)" />
                            <line id="guide-2" x1="0" y1="-55" x2="0" y2="55" stroke="#e5e5ea" stroke-dasharray="4" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="channel-block">
                <div id="latex-prod" class="channel-title"></div>
                <div class="mini-svg-container">
                    <svg viewBox="0 0 600 110">
                        <g transform="translate(45,55)">
                            <rect id="view-integ-window" class="integ-window view-window-hidden" x="0" y="-55" width="0" height="110" />
                            <rect id="active-overlap" class="overlap-box-hidden" fill="rgba(231,76,60,0.10)" stroke="rgba(231,76,60,0.35)" stroke-dasharray="4 3" />
                            <line x1="0" y1="0" x2="500" y2="0" class="axis" />
                            <path id="path-overlap-fill" fill="rgba(231,76,60,0.22)" stroke="none" />
                            <path id="path-prod" class="sig-prod" />
                            <line id="guide-3" x1="0" y1="-55" x2="0" y2="55" stroke="#e5e5ea" stroke-dasharray="4" />
                        </g>
                    </svg>
                </div>
            </div>

            <div class="channel-block">
                <div id="latex-res" class="channel-title-res"></div>
                <div class="mini-svg-container">
                    <svg viewBox="0 0 600 110">
                        <g transform="translate(45,65)">
                            <line id="line-max" x1="0" y1="0" x2="500" y2="0" class="max-line" />
                            <text id="text-max" class="max-text" x="505" y="-5">Max: 0.00</text>
                            <text id="text-gain" class="max-text" x="505" y="10">Ganancia G: 1.00</text>
                            <line x1="0" y1="0" x2="500" y2="0" class="axis" />
                            <path id="path-res-fill" class="sig-res-fill" />
                            <path id="path-res" class="sig-res" />
                            <circle id="p4" r="5" fill="var(--inverse)" />
                            <line id="guide-4" x1="0" y1="-65" x2="0" y2="45" stroke="#e5e5ea" stroke-dasharray="4" />
                        </g>
                    </svg>
                </div>
            </div>
        </div>

        <div id="focus-h" class="focus-box"></div>
        <div id="focus-prod" class="focus-box"></div>
        <div id="focus-res" class="focus-box"></div>

        <div class="stage-right">
            <div id="latex-overlay-title" class="math-label-fixed"></div>
            <div id="shift-display" class="shift-display">Desplazamiento: t = 0</div>    

            <svg id="canvas-right" viewBox="0 0 650 660">
                <g transform="translate(70,330)">
                    <line x1="0" y1="-220" x2="500" y2="-220" stroke="#f0f0f5" />
                    <line x1="0" y1="220" x2="500" y2="220" stroke="#f0f0f5" />
                    <line x1="250" y1="-240" x2="250" y2="240" stroke="#e5e5ea" stroke-dasharray="2,2" />
                    <line x1="0" y1="0" x2="500" y2="0" class="axis" />

                    <path id="path-overlay-f" class="sig-f filter-overlay-f" />
                    <path id="path-overlay-h" class="sig-h filter-overlay-h" />
                    <path id="path-overlay-res" class="sig-res overlay-res-thick" />
                    
                    <line id="overlay-time-line" x1="0" y1="-230" x2="0" y2="230" stroke="var(--result)" stroke-width="1.5" stroke-dasharray="3,3" />
                    <circle id="p-overlay-res" r="6" fill="var(--result)" />
                </g>
            </svg>

            <div id="didactic-panel" class="didactic-panel">
                <div id="didactic-title" class="didactic-title">Introducción</div>
                <div id="didactic-text" class="didactic-text">Selecciona el modo paso a paso para comenzar.</div>
            </div>
        </div>
    </div>

    <div class="signal-legend">
        <div class="legend-item">
            <span class="legend-color signal-f"></span> Entrada f(τ)
        </div>
        <div class="legend-item">
            <span class="legend-color signal-h"></span> Sistema h(t−τ)
        </div>
        <div class="legend-item">
            <span class="legend-color signal-p"></span> Producto
        </div>
        <div class="legend-item">
            <span class="legend-color signal-r"></span> Resultado
        </div>
    </div>   

    <div class="controls"> 
        <section class="control-section">
            <div class="control-section-title">Señales y Sistema</div>
            <div class="control-section-content">
                <div class="control-group" id="grp-sf">
                    <label for="sf">Señal de Entrada f(τ)</label>
                    <select id="sf">
                        <option value="cos">Coseno</option>
                        <option value="rect">Pulso Rectangular</option>
                        <option value="bipolar">Pulso Bipolar</option>
                        <option value="escalon">Escalón Unitario</option>
                        <option value="sierra">Diente de Sierra</option>
                        <option value="ruido" selected>Ruido Blanco</option>
                    </select>
                </div>

                <div class="control-group" id="grp-freq">
                    <label for="freq">Frecuencia Entrada</label>
                    <div class="slider-box">
                        <input type="range" id="freq" min="0.5" max="3" step="0.1" value="1" />
                        <span class="val-display" id="v-freq">1.0</span>
                    </div>
                </div>

                <div class="control-group" id="grp-sh">
                    <label for="sh">Sistema / Filtro h(τ)</label>
                    <select id="sh">
                        <option value="delta">Impulso Ideal δ</option>
                        <option value="rect_f">Pulso Rectangular</option>
                        <option value="deriv">Filtro Derivador</option>
                        <option value="per_tri">Triangular</option>
                        <option value="exp" selected>Exponencial</option>
                        <option value="sinc">Filtro Sinc</option>
                    </select>
                </div>

                <div class="control-group" id="grp-width">
                    <label id="lbl-width" for="width">Ancho del Filtro</label>
                    <div class="slider-box">
                        <input type="range" id="width" min="10" max="150" step="5" value="40" />
                        <span class="val-display" id="v-width">40</span>
                    </div>
                </div>
            </div>
        </section>
 
        <section class="control-section">
            <div class="control-section-title">Operador</div>
            <div class="control-section-content">
                <div class="control-group">
                    <label for="b-mode">Operador</label>
                    <button id="b-mode" title="Invierte, desplaza y acumula el solape entre señales">CONVOLUCIÓN</button>
                </div>

                <div class="control-group" id="grp-causal">
                    <label for="b-causal">Física del Filtro</label>
                    <button id="b-causal">NO CAUSAL</button>
                </div>

                <div class="control-group">
                    <label for="b-type">Tipo de Integral</label>
                    <button id="b-type" title="Alterna entre convolución lineal y periódica">LINEAL GLOBAL</button>
                </div>

                <div class="control-group">
                    <label for="b-scale">Escala Visual</label>
                    <button id="b-scale">Escala: AUTO</button>
                </div>
            </div>
        </section>

        <section class="control-section">
            <div class="control-section-title">Exploración</div>
            <div class="control-section-content">
                <div class="control-group">
                    <label for="st">Tiempo (Slider t)</label>
                    <div class="time-header">
                        <span class="time-title">Tiempo de observación</span>
                        <span class="time-big" id="time-big">t = 0</span>
                    </div>               
                    <div class="slider-box">
                        <input type="range" id="st" min="0" max="500" value="250" />
                        <span class="val-display" id="v-t">0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="b-play">Animación</label>
                    <button id="b-play" title="Activa la animación temporal automática">▶ PLAY</button>
                </div>

                <div class="control-group" id="grp-step">
                    <label for="b-step-mode">Modo Didáctico</label>
                    <div class="didactic-button-container">
                        <button id="b-step-mode" class="btn-step-mode" title="Muestra visualmente las etapas matemáticas de la convolución">PASO A PASO</button>
                        <button id="b-step-next" class="btn-step-next">▶</button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="b-freeze">Congelar</label>
                    <button id="b-freeze">CONGELAR t</button>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="js/state.js"></script>
<script src="js/signals.js"></script>
<script src="js/filters.js"></script>
<script src="js/convolution.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>

<div id="integral-ghost"></div>
</body>
</html>
